favicon: /images/favicon.ico
apple_touch_icon: /images/apple-touch-icon-180x180.png

force_https: true

fun_features:
  typing:
    enable: false
  anchorjs:
    enable: true
    placement: left
    visible: hover
  progressbar:
    enable: true

dark_mode:
  enable: true
  default: auto

color:
  body_bg_color: "#f4f7f8"
  navbar_bg_color: "#2f4154"
  navbar_bg_color_dark: "#1f3144"
  text_color: "#334155"
  post_link_color: "#217f86"
  link_hover_color: "#e06f45"

font:
  font_size: 16px
  font_family: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Helvetica Neue", Arial, sans-serif'
  letter_spacing: 0
  code_font_size: 85%

custom_js:
  - /js/archive-cards.js
  - /js/daily-materials.js
  - /js/site-runtime.js

custom_css:
  - /css/custom.css

navbar:
  blog_title: dreaveler
  ground_glass:
    enable: true
    px: 3
    alpha: 0.68
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill", name: "首页" }
    - { key: "notes", link: "/notes/", icon: "iconfont icon-books", name: "笔记" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill", name: "文章" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill", name: "分类" }
    - { key: "links", link: "/links/", icon: "iconfont icon-link-fill", name: "友栏" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill", name: "关于" }
    - { key: "github", link: "https://github.com/dreaveler", icon: "iconfont icon-github-fill", name: "GitHub", target: "_blank" }

search:
  enable: true
  path: /local-search.xml
  generate_path: /local-search.xml
  field: all
  content: true

banner:
  random_img: false
  parallax: true
  width_height_ratio: 1.0

index:
  banner_img: /images/banners/lake-night.jpg
  banner_img_height: 96
  banner_mask_alpha: 0.52
  slogan:
    enable: true
    text: '你好呀！我是 dreaveler，PKU 信科智能方向本科生。<br>正在 embodied AI、运动仿真与可信机器学习方向继续学习和探索。<br>欢迎来到我的博客！'
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true

post:
  banner_img: /images/banners/nebula.jpg
  banner_img_height: 66
  banner_mask_alpha: 0.56
  meta:
    author:
      enable: false
    date:
      enable: true
      format: "YYYY-MM-DD"
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 2
      wpm: 80
    views:
      enable: false
  category_bar:
    enable: true
    specific: true
    placement: left
    post_order_by: number
    post_limit: 0
  toc:
    enable: true
    expand_all: true
    placement: right
    collapseDepth: 0
  copyright:
    enable: false
  prev_next:
    enable: true
  image_caption:
    enable: true
  image_zoom:
    enable: true
  footnote:
    enable: true
  math:
    enable: true
    specific: true
    engine: katex
  comments:
    enable: false

archive:
  banner_img: /images/banners/moon-horizon.jpg
  banner_img_height: 58
  banner_mask_alpha: 0.55

category:
  enable: true
  banner_img: /images/banners/aurora.jpg
  banner_img_height: 58
  banner_mask_alpha: 0.55
  order_by: name
  collapse_depth: 1
  post_order_by: number
  post_limit: 0

tag:
  enable: true
  banner_img: /images/banners/mist-forest.jpg
  banner_img_height: 58
  banner_mask_alpha: 0.55

about:
  enable: true
  banner_img: /images/banners/mountains.jpg
  banner_img_height: 68
  banner_mask_alpha: 0.52
  avatar: /images/dreaveler.png
  name: dreaveler
  intro: PKU AI undergraduate. Notes, coursework, and project writeups.
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/dreaveler", tip: "GitHub" }
    - { class: "iconfont icon-mail", link: "mailto:2169448673@qq.com", tip: "Email" }
    - { class: "iconfont icon-wechat-fill", qrcode: "/images/wechat.jpg", tip: "WeChat" }

links:
  enable: true
  title: 友栏
  subtitle: 与同路人保持联结
  banner_img: /images/banners/ocean.jpg
  banner_img_height: 58
  banner_mask_alpha: 0.55
  items:
    - {
      title: "Dreaveler GitHub",
      intro: "代码、笔记与项目记录",
      link: "https://github.com/dreaveler",
      avatar: "/images/favicon-192x192.png"
    }
    - {
      title: "课程笔记",
      intro: "公开整理的课程笔记入口",
      link: "/notes/",
      avatar: "/images/site-logo.png"
    }
    - {
      title: "Fluid",
      intro: "当前站点使用的 Hexo 主题",
      link: "https://github.com/fluid-dev/hexo-theme-fluid",
      avatar: "/images/favicon-192x192.png"
    }
  onerror_avatar: /images/favicon-192x192.png
  custom:
    enable: true
    content: '<div class="links-note">友栏还会慢慢补上更多同路人。</div>'
  comments:
    enable: false

page:
  banner_img: /images/banners/nebula.jpg
  banner_img_height: 58
  banner_mask_alpha: 0.55

page404:
  enable: true
  banner_img: /images/banners/desert.jpg
  banner_img_height: 85
  banner_mask_alpha: 0.55

footer:
  content: '
    <span class="site-footer-line">建站时间 <time id="site-started-at" datetime="2025-06-16" data-start-date="2025-06-16">2025-06-16</time><span id="site-runtime-days" class="site-runtime-days"></span></span>
    <span class="footer-sep">·</span>
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a>
    <i class="iconfont icon-love"></i>
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>
  '
  statistics:
    enable: false
